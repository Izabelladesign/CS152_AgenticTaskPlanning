<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1117;--surface:#161B22;--border:#30363D;--text:#E6EDF3;--muted:#8B949E;--orange:#F0883E;--red:#F85149;--red-d:#1E0A0A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;}
header{border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;background:var(--surface);}
.logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 8px var(--orange);}
.sub{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.layout{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden;}
aside{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.s-section{padding:20px;border-bottom:1px solid var(--border);}
.s-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;}
input[type=text],input[type=number],input[type=date]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 11px;color:var(--text);font-size:.82rem;font-family:'Outfit',sans-serif;}
input:focus{outline:none;border-color:var(--orange);}
input[type=range]{width:100%;accent-color:var(--orange);}
.field{margin-bottom:10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;font-size:.8rem;padding:9px 16px;width:100%;}
.btn-orange{background:var(--orange);color:#000;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--red-d);color:var(--red);border:1px solid rgba(248,81,73,.3);padding:5px 10px;font-size:.74rem;width:auto;}
.gen-wrap{padding:16px 20px;}
.main{display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--surface);}
.tab-btn{padding:14px 16px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Outfit',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
.badge{background:rgba(240,136,62,.15);color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:1px 6px;border-radius:10px;margin-left:6px;}
.panel{display:none;overflow-y:auto;padding:24px;flex:1;}
.panel.active{display:block;}
.panel-hdr{display:flex;align-items:center;margin-bottom:18px;}
.panel-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;flex:1;}
#task-list{display:flex;flex-direction:column;gap:8px;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:14px;}
.tc-body{flex:1;}
.tc-name{font-weight:600;font-size:.88rem;}
.tc-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.pips{display:flex;gap:3px;}
.pip{width:6px;height:6px;border-radius:50%;background:var(--border);}
.pip.on{background:var(--orange);}
.empty{text-align:center;padding:56px 24px;color:var(--muted);}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:.4;}
#sched-empty{text-align:center;padding:56px 24px;color:var(--muted);}
#sched-empty h2{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:8px;color:var(--text);}
.alert{background:var(--red-d);border:1px solid rgba(248,81,73,.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:.8rem;color:var(--red);display:none;}
#day-list{display:flex;flex-direction:column;gap:10px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.day-head{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border);}
.day-name{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;flex:1;}
.day-bar-wrap{flex:0 0 120px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.day-bar{height:100%;background:var(--orange);border-radius:3px;}
.day-bar.over{background:var(--red);}
.day-hrs{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);}
.day-slots{padding:10px 16px;display:flex;flex-direction:column;gap:7px;}
.slot{display:flex;align-items:center;gap:10px;}
.slot-name{flex:1;font-size:.82rem;}
.slot-bar-wrap{flex:0 0 90px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.slot-bar{height:100%;background:var(--orange);opacity:.5;}
.slot-h{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);}
#log-pre{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;white-space:pre-wrap;line-height:1.8;color:var(--muted);display:none;}
.l-head{color:var(--orange);}
.l-fired{color:#3FB950;}
.l-pass{color:#3D444D;}
#toast{position:fixed;bottom:22px;right:22px;background:#1C2230;border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-size:.78rem;z-index:999;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;font-family:'JetBrains Mono',monospace;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.err{border-color:var(--red);color:var(--red);}
.spin{width:13px;height:13px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:rot .5s linear infinite;display:inline-block;}
@keyframes rot{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="dot"></span>
    Task Planner
    <span class="sub">multi-agent scheduler</span>
  </div>
</header>
<div class="layout">
  <aside>
    <div class="s-section" style="flex:1">
      <div class="s-label">Add Task</div>
      <div class="field">
        <label>Task name</label>
        <input type="text" id="f-name" placeholder="e.g. Final Project">
      </div>
      <div class="field">
        <label>Course / Category</label>
        <input type="text" id="f-course" placeholder="Optional">
      </div>
      <div class="row2" style="margin-bottom:10px">
        <div class="field" style="margin:0">
          <label>Due date</label>
          <input type="date" id="f-due">
        </div>
        <div class="field" style="margin:0">
          <label>Est. hours</label>
          <input type="number" id="f-hours" value="2" min="0.25" step="0.25">
        </div>
      </div>
      <div class="field">
        <label>Difficulty <span id="diff-val" style="color:var(--orange);font-family:'JetBrains Mono',monospace">3</span>/5</label>
        <input type="range" id="f-diff" min="1" max="5" value="3" oninput="document.getElementById('diff-val').textContent=this.value">
      </div>
      <button class="btn btn-ghost" onclick="addTask()" style="margin-top:6px">+ Add Task</button>
    </div>
    <div class="s-section">
      <div class="s-label">Constraints</div>
      <div class="row2">
        <div class="field" style="margin:0">
          <label>Start date</label>
          <input type="date" id="c-start">
        </div>
        <div class="field" style="margin:0">
          <label>Max hrs / day</label>
          <input type="number" id="c-maxh" value="6" min="0.5" max="24" step="0.5">
        </div>
      </div>
    </div>
    <div class="gen-wrap">
      <button class="btn btn-orange" id="gen-btn" onclick="generate()">&#9889; Generate Schedule</button>
    </div>
  </aside>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" onclick="goTab('tasks',this)">Tasks<span class="badge" id="task-count">0</span></button>
      <button class="tab-btn" onclick="goTab('schedule',this)">Schedule</button>
      <button class="tab-btn" onclick="goTab('log',this)">Rule Log</button>
    </div>
    <div class="panel active" id="tasks-panel">
      <div class="panel-hdr">
        <span class="panel-title">Your Tasks</span>
        <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
      </div>
      <div id="task-list">
        <div class="empty" id="task-empty">
          <div class="empty-icon">&#128221;</div>
          <p>No tasks yet. Add one from the sidebar.</p>
        </div>
      </div>
    </div>
    <div class="panel" id="schedule-panel">
      <div id="sched-empty">
        <h2>No schedule yet</h2>
        <p>Add tasks then hit <strong style="color:var(--orange)">&#9889; Generate Schedule</strong></p>
      </div>
      <div id="sched-content" style="display:none">
        <div class="alert" id="alert-box"></div>
        <div id="day-list"></div>
      </div>
    </div>
    <div class="panel" id="log-panel">
      <div class="empty" id="log-empty">
        <div class="empty-icon">&#128203;</div>
        <p>Rule trace appears here after scheduling.</p>
      </div>
      <pre id="log-pre"></pre>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var tasks = [];

document.addEventListener('DOMContentLoaded', function() {
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('f-due').value = today;
  document.getElementById('c-start').value = today;
  api('/api/tasks').then(function(data) { tasks = data; renderTasks(); });
});

function goTab(id, btn) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(id + '-panel').classList.add('active');
  btn.classList.add('active');
}

function addTask() {
  var name   = document.getElementById('f-name').value.trim();
  var due    = document.getElementById('f-due').value;
  var hours  = parseFloat(document.getElementById('f-hours').value);
  var diff   = parseInt(document.getElementById('f-diff').value);
  var course = document.getElementById('f-course').value.trim();
  if (!name) { toast('Task name required.', true); return; }
  if (!due)  { toast('Due date required.', true); return; }
  api('/api/tasks', 'POST', {name: name, due_date: due, estimated_hours: hours, difficulty: diff, course: course})
    .then(function() { return api('/api/tasks'); })
    .then(function(data) {
      tasks = data;
      renderTasks();
      document.getElementById('f-name').value = '';
      document.getElementById('f-course').value = '';
      toast('Task added');
    })
    .catch(function(e) { toast(e.message, true); });
}

function deleteTask(id) {
  api('/api/tasks/' + id, 'DELETE')
    .then(function() { return api('/api/tasks'); })
    .then(function(data) { tasks = data; renderTasks(); })
    .catch(function(e) { toast(e.message, true); });
}

function clearAll() {
  if (!tasks.length) return;
  if (!confirm('Clear all tasks?')) return;
  api('/api/tasks', 'DELETE')
    .then(function() { tasks = []; renderTasks(); })
    .catch(function(e) { toast(e.message, true); });
}

function renderTasks() {
  var list  = document.getElementById('task-list');
  var empty = document.getElementById('task-empty');
  document.getElementById('task-count').textContent = tasks.length;
  if (!tasks.length) {
    list.innerHTML = '';
    if (empty) { list.appendChild(empty); empty.style.display = 'block'; }
    return;
  }
  if (empty) empty.style.display = 'none';
  var html = '';
  for (var i = 0; i < tasks.length; i++) {
    var t = tasks[i];
    var pips = '';
    for (var n = 1; n <= 5; n++) {
      pips += '<span class="pip ' + (n <= t.difficulty ? 'on' : '') + '"></span>';
    }
    html += '<div class="task-card">'
      + '<div class="tc-body">'
      + '<div class="tc-name">' + esc(t.name) + '</div>'
      + '<div class="tc-meta">'
      + '<span>&#128197; ' + t.due_date + '</span>'
      + '<span>&#9201; ' + t.estimated_hours + 'h</span>'
      + '<span><span class="pips">' + pips + '</span></span>'
      + (t.course ? '<span>&#128218; ' + esc(t.course) + '</span>' : '')
      + '</div></div>'
      + '<button class="btn btn-danger" onclick="deleteTask(\'' + t.id + '\')">&#x2715;</button>'
      + '</div>';
  }
  list.innerHTML = html;
}

function generate() {
  var btn   = document.getElementById('gen-btn');
  var maxH  = parseFloat(document.getElementById('c-maxh').value);
  var start = document.getElementById('c-start').value;
  if (!start) { toast('Set a start date.', true); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Scheduling...';
  api('/api/schedule', 'POST', {max_hours: maxH, start_date: start})
    .then(function(res) {
      renderSchedule(res, maxH);
      renderLog(res.log);
      goTab('schedule', document.querySelectorAll('.tab-btn')[1]);
      toast('Schedule ready!');
    })
    .catch(function(e) { toast(e.message, true); })
    .finally(function() { btn.disabled = false; btn.innerHTML = '&#9889; Generate Schedule'; });
}

function renderSchedule(res, maxH) {
  document.getElementById('sched-empty').style.display = 'none';
  document.getElementById('sched-content').style.display = 'block';
  var alertBox = document.getElementById('alert-box');
  if (res.unscheduled && res.unscheduled.length) {
    alertBox.style.display = 'block';
    alertBox.innerHTML = '<strong>&#9888; ' + res.unscheduled.length + ' task(s) could not be scheduled</strong><br>'
      + res.unscheduled.map(function(n) { return '&#8226; ' + esc(n); }).join('  ');
  } else {
    alertBox.style.display = 'none';
  }
  var html = '';
  for (var i = 0; i < res.days.length; i++) {
    var day  = res.days[i];
    var pct  = Math.min(100, (day.total / maxH) * 100);
    var over = day.total > maxH;
    var slots = '';
    for (var j = 0; j < day.slots.length; j++) {
      var s  = day.slots[j];
      var sp = Math.min(100, (s.hours / maxH) * 100);
      slots += '<div class="slot">'
        + '<div class="slot-name">' + esc(s.name) + '</div>'
        + '<div class="slot-bar-wrap"><div class="slot-bar" style="width:' + sp + '%"></div></div>'
        + '<div class="slot-h">' + s.hours + 'h</div>'
        + '</div>';
    }
    html += '<div class="day-card">'
      + '<div class="day-head">'
      + '<div class="day-name">' + esc(day.label) + '</div>'
      + '<div class="day-bar-wrap"><div class="day-bar ' + (over ? 'over' : '') + '" style="width:' + pct + '%"></div></div>'
      + '<div class="day-hrs">' + day.total + 'h / ' + maxH + 'h</div>'
      + '</div>'
      + '<div class="day-slots">' + slots + '</div>'
      + '</div>';
  }
  document.getElementById('day-list').innerHTML = html;
}

function renderLog(lines) {
  if (!lines || !lines.length) return;
  document.getElementById('log-empty').style.display = 'none';
  var pre = document.getElementById('log-pre');
  pre.style.display = 'block';
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    var l = esc(lines[i]);
    if (lines[i].indexOf('──') === 0) {
      html += '<span class="l-head">' + l + '</span>\n';
    } else if (lines[i].indexOf('[FIRED]') !== -1) {
      html += '<span class="l-fired">' + l + '</span>\n';
    } else if (lines[i].indexOf('[PASS]') !== -1) {
      html += '<span class="l-pass">' + l + '</span>\n';
    } else {
      html += l + '\n';
    }
  }
  pre.innerHTML = html;
}

function api(url, method, body) {
  method = method || 'GET';
  var opts = {method: method, headers: {}};
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(url, opts).then(function(r) {
    return r.json().then(function(j) {
      if (!r.ok) throw new Error(j.error || 'Request failed');
      return j;
    });
  });
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

var tt;
function toast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(tt);
  tt = setTimeout(function() { el.className = ''; }, 3000);
}
</script>
</body>
</html>
